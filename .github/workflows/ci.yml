name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend ─────────────────────────────────────────────────

  frontend-checks:
    name: Frontend — Type Check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    needs: frontend-checks
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  # ── Backend ──────────────────────────────────────────────────

  backend-checks:
    name: Backend — Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run type-check --workspaces --if-present
      - run: npm run lint --workspaces --if-present

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: backend-checks
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: modulas_test
          POSTGRES_USER: modulas
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test --workspaces --if-present
        env:
          DATABASE_URL: postgresql://modulas:test@localhost:5432/modulas_test
          REDIS_URL: redis://localhost:6379

  # ── AI Modules ───────────────────────────────────────────────

  ai-modules-test:
    name: AI Modules — Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test --workspace=ai-modules/interior-assistant --if-present
      - run: npm test --workspace=ai-modules/seo-optimizer --if-present

  # ── Security ─────────────────────────────────────────────────

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm audit --audit-level=high
